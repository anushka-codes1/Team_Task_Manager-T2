<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Manager</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <div class="container">
        <h1>Team Task Manager</h1>
        <div class="task">
            <input type="text" id="taskTitle" placeholder="Enter the task title"/>
            <textarea id="taskDescription" placeholder="Enter the description of your task (optional)">     
            </textarea>
            <button id="addTaskButton">Add Task</button>
        </div>
        <div id="taskList" style="margin-top: 20px;">
            <!-- Tasks will appear here -->
        </div>

        <div id="completedTaskList" style="margin-top: 40px; border-top: 2px dashed #ccc; padding-top: 20px;">
            <h2>Completed Tasks</h2>
            <!-- Completed tasks will appear here -->
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
