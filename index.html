<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Manager</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <div class="container">
        <h1>Team Task Manager</h1>
         <p class="subtitle">Manage and track team tasks easily</p>
        <div class="task">
            <input type="text" id="taskTitle" placeholder="Enter the task title"/>
            <textarea id="taskDescription" placeholder="Enter the description of your task (optional)"></textarea>
            <button id="addTaskButton">Add Task</button>
        </div>
        <div id="pendingSection" style="display: none;">
    <h2>Pending Tasks</h2>
    <div id="pendingTaskList"></div>
</div>

<div id="ongoingSection" style="display: none;">
    <h2>Ongoing Tasks</h2>
    <div id="ongoingTaskList"></div>
</div>

<div id="completedSection" style="display: none;">
    <h2>Completed Tasks</h2>
    <div id="completedTaskList"></div>
</div>

       
    </div>

    <script src="./script.js"></script>
</body>
</html>
